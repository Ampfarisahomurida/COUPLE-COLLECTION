<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart - Couple Collection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a href="index.html"><span class="logo-mark">CC</span><span class="brand-name">Couple Collection</span></a>
    </div>
    <nav class="site-nav">
      <a href="shop.html">Shop</a>
      <a href="checkout.html">Checkout</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-heading">
      <h3>Your Cart</h3>
      <p>Review items before checkout and continue shopping with a clean cart layout.</p>
    </section>
    <div id="cart-items"></div>
    <div id="cart-total" class="cart-total"></div>
    <div class="cart-actions">
      <a class="button" href="shop.html">Continue Shopping</a>
      <a class="button primary" href="checkout.html">Proceed to Checkout</a>
    </div>
  </main>

  <script>
    const API_BASE = '/backend/php/api';

    function formatPrice(value){
      return `R${Number(value || 0).toFixed(2)}`;
    }

    function getLocalCart(){
      try{
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        return Array.isArray(cart) ? cart : [];
      }catch(e){
        return [];
      }
    }

    function saveLocalCart(cart){
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function normalizeItem(item){
      return {
        id: item.product_id || item.id,
        name: item.name,
        price: Number(item.price || 0),
        qty: Number(item.qty || 1)
      };
    }

    function renderCart(items){
      const out = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const normalized = items.map(normalizeItem).filter(item => item.id && item.name);

      if(!normalized.length){
        out.innerHTML = '<p>Your cart is empty.</p>';
        totalEl.textContent = '';
        return;
      }

      let total = 0;
      out.innerHTML = normalized.map(item => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        return `<div class="cart-row">
          <div><strong>${item.name}</strong></div>
          <div>${item.qty} x ${formatPrice(item.price)}</div>
          <div>${formatPrice(itemTotal)}</div>
          <div class="cart-row-actions">
            <button class="qty-item" data-action="decrease" data-id="${item.id}">-</button>
            <button class="qty-item" data-action="increase" data-id="${item.id}">+</button>
            <button class="remove-item" data-id="${item.id}">Remove</button>
          </div>
        </div>`;
      }).join('');
      totalEl.textContent = `Total: ${formatPrice(total)}`;

      document.querySelectorAll('.qty-item').forEach(btn => btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        const action = e.target.dataset.action;
        const cart = getLocalCart();
        const item = cart.find(product => product.id == id);
        if(!item) return;

        item.qty = Number(item.qty || 1) + (action === 'increase' ? 1 : -1);
        const updated = cart.filter(product => Number(product.qty || 0) > 0);
        saveLocalCart(updated);

        try{
          await fetch(`${API_BASE}/cart.php`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id, qty: Math.max(Number(item.qty || 0), 0)})
          });
        }catch(error){
          console.warn('Cart sync failed', error);
        }

        renderCart(updated);
      }));

      document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        const cart = getLocalCart().filter(item => item.id != id);
        saveLocalCart(cart);

        try{
          await fetch(`${API_BASE}/cart.php`, {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id})
          });
        }catch(error){
          console.warn('Cart sync failed', error);
        }

        renderCart(cart);
      }));
    }

    async function loadCart(){
      let items = [];
      try{
        const response = await fetch(`${API_BASE}/cart.php`);
        if(response.ok){
          items = await response.json();
        }
      }catch(e){
        items = [];
      }

      if(!Array.isArray(items) || !items.length){
        items = getLocalCart();
      } else {
        saveLocalCart(items.map(normalizeItem));
      }

      renderCart(items);
    }

    document.addEventListener('DOMContentLoaded', loadCart);
  </script>
</body>
</html>
