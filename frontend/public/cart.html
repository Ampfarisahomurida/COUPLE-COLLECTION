<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — Couple Collection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a href="index.html"><span class="logo-mark">CC</span><span class="brand-name">Couple Collection</span></a>
    </div>
    <nav class="site-nav">
      <a href="shop.html">Shop</a>
      <a href="checkout.html">Checkout</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-heading">
      <h3>Your Cart</h3>
      <p>Review items before checkout and continue shopping with a modern, clean cart layout.</p>
    </section>
    <div id="cart-items"></div>
    <div id="cart-total" class="cart-total"></div>
    <div class="cart-actions">
      <a class="button" href="shop.html">Continue Shopping</a>
      <a class="button primary" href="checkout.html">Proceed to Checkout</a>
    </div>
  </main>
  <script>
    const API_BASE = '/backend/php/api';

    function formatPrice(value){
      return `R${value.toFixed(2)}`;
    }

    function renderCart(items){
      const out = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      if(!items.length){
        out.innerHTML = '<p>Your cart is empty.</p>';
        totalEl.textContent = '';
        return;
      }
      let total = 0;
      out.innerHTML = items.map(item => {
        const itemTotal = (item.price||0) * (item.qty||1);
        total += itemTotal;
        return `<div class="cart-row">
          <div><strong>${item.name}</strong></div>
          <div>${item.qty} × ${formatPrice(item.price||0)}</div>
          <div>${formatPrice(itemTotal)}</div>
          <div><button class="remove-item" data-id="${item.id}">Remove</button></div>
        </div>`;
      }).join('');
      totalEl.textContent = `Total: ${formatPrice(total)}`;
      document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        const cart = JSON.parse(localStorage.getItem('cart')||'[]').filter(item => item.id != id);
        localStorage.setItem('cart', JSON.stringify(cart));
        try{ await fetch(`${API_BASE}/cart.php`, {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); }catch(e){ console.warn('Cart sync failed', e); }
        renderCart(cart);
      }));
    }

    async function loadCart(){
      let items = [];
      try{
        const response = await fetch(`${API_BASE}/cart.php`);
        if(response.ok){
          items = await response.json();
          if(Array.isArray(items) && items.length){
            localStorage.setItem('cart', JSON.stringify(items));
          }
        }
      }catch(e){ /* ignore */ }
      if(!items.length){
        items = JSON.parse(localStorage.getItem('cart')||'[]');
      }
      renderCart(items);
    }

    document.addEventListener('DOMContentLoaded', loadCart);
  </script>
</body>
</html>
