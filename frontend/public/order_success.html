<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Order Confirmation — Couple Collection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a href="index.html"><span class="logo-mark">CC</span><span class="brand-name">Couple Collection</span></a>
    </div>
    <nav class="site-nav">
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>
  <main class="page-shell">
    <section class="page-heading">
      <h3>Order Confirmation</h3>
      <p>Your order has been placed successfully. Thank you for shopping with us.</p>
    </section>
    <div id="confirmation"></div>
    <a class="button primary" href="shop.html">Continue Shopping</a>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    const container = document.getElementById('confirmation');
    if(orderId){
      container.innerHTML = `<p>Thank you! Your order has been received.</p><p>Order ID: <strong>${orderId}</strong></p><p>We will process it shortly.</p>`;
    } else {
      container.innerHTML = '<p>Order confirmation not found. If you just submitted an order, please check your email or try again.</p>';
    }
  </script>
</body>
</html>
