server {
    listen 80;
    server_name _;
    root /var/www/html/frontend/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/backend/php/(.*\.php)$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/php/$1;
        fastcgi_param SCRIPT_NAME /backend/php/$1;
        fastcgi_param PATH_INFO $uri;
    }

    location /backend/php/uploads/ {
        alias /var/www/html/backend/php/uploads/;
    }

    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|webp)$ {
        expires 30d;
        access_log off;
    }
}
